events {}

http {
  server {
    listen 80;
    server_name _;

    location /api/ {
      proxy_pass http://backend:8000/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      # VLM inference (classification/chat) can legitimately take several
      # minutes on CPU-only hardware — observed up to ~6 min including a
      # cold model load. Must stay >= the frontend client's own timeout
      # (frontend/src/services/analysis.service.ts) or nginx cuts the
      # connection first regardless of what the client allows.
      proxy_read_timeout 600s;
      proxy_send_timeout 600s;
    }

    location /docs {
      proxy_pass http://backend:8000/docs;
      proxy_set_header Host $host;
    }

    location /openapi.json {
      proxy_pass http://backend:8000/openapi.json;
      proxy_set_header Host $host;
    }

    # location /webhook {
    #   proxy_pass http://deploy-webhook:9000/webhook;
    #   proxy_set_header Host $host;
    #   proxy_read_timeout 600s;
    # }

    location / {
      proxy_pass http://frontend:5173/;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
