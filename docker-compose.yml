services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: leafmind
      POSTGRES_PASSWORD: leafmind
      POSTGRES_DB: leafmind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leafmind"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://leafmind:leafmind@postgres:5432/leafmind
      # Wildcard ngrok subdomains are matched via allow_origin_regex in
      # app/main.py instead — CORSMiddleware's allow_origins only supports
      # exact string matches, so a "*.ngrok-free.app" entry here would
      # silently never match anything.
      CORS_ORIGINS: http://leafmind.local,http://localhost:5173,http://100.66.5.122
      # The VLM/embedding models are large (~7GB) and only need to be
      # fetched once — HF_HOME persists them in the named volume below
      # across container recreates, and HF_HUB_OFFLINE skips the
      # network freshness-check `from_pretrained` does by default (which
      # otherwise hangs/retries for minutes whenever huggingface.co is
      # slow or unreachable, even though nothing has actually changed).
      # Set HF_HUB_OFFLINE=0 here (or unset it) the first time you add a
      # new model so it can be downloaded.
      HF_HOME: /root/.cache/huggingface
      HF_HUB_OFFLINE: "0"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./datasets:/datasets:ro
      - backend_uploads:/app/uploads
      - backend_documents:/app/documents
      - backend_chroma:/app/chroma_data
      - backend_hf_cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
    # Passes the host's NVIDIA GPU through to the container (requires the
    # NVIDIA Container Toolkit / Docker Desktop's WSL2 GPU support — already
    # confirmed working via `docker run --gpus all ... nvidia-smi`). Without
    # this, torch.cuda.is_available() is always False inside the container
    # even with a CUDA-enabled torch build installed, since no GPU device is
    # visible to it at all — VLM_DEVICE/RAG_EMBEDDING_DEVICE's "auto" then
    # has nothing to detect and silently falls back to CPU.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: /api/v1
      VITE_APP_NAME: LeafMind
      VITE_APP_ENV: development
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  backend_uploads:
  backend_documents:
  backend_chroma:
  backend_hf_cache:
