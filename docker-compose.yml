services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: leafmind
      POSTGRES_PASSWORD: leafmind
      POSTGRES_DB: leafmind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leafmind"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://leafmind:leafmind@postgres:5432/leafmind
      CORS_ORIGINS: http://leafmind.local,http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
      - backend_documents:/app/documents
      - backend_chroma:/app/chroma_data
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://leafmind.local/api/v1
      VITE_APP_NAME: LeafMind
      VITE_APP_ENV: development
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  backend_uploads:
  backend_documents:
  backend_chroma:
